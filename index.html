<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Creator.</title>
    <!-- Importing a clean, modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfb; /* Very soft off-white */
            color: #111111; /* Deep charcoal, softer than pure black */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        /* Typography */
        h1 {
            font-size: 4.5rem;
            font-weight: 600;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
        }

        .dot {
            color: #999999; /* Subtle dot color */
        }

        p {
            font-size: 1.15rem;
            font-weight: 300;
            color: #666666;
            margin-bottom: 3rem;
            letter-spacing: 0.02em;
        }

        /* Contact Buttons */
        .contact-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            text-decoration: none;
            color: #111111;
            font-size: 0.95rem;
            font-weight: 400;
            padding: 0.8rem 1.8rem;
            border: 1px solid #e0e0e0;
            border-radius: 50px; /* Elegant pill shape */
            transition: all 0.4s ease;
            display: inline-block;
        }

        /* Hover Effects */
        a:hover {
            background-color: #111111;
            color: #ffffff;
            border-color: #111111;
            transform: translateY(-2px);
        }

        /* Subtle Entrance Animations */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUpAnim 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }

        @keyframes fadeUpAnim {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            h1 {
                font-size: 3rem;
            }
            .contact-links {
                flex-direction: column;
                gap: 1rem;
            }
            a {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <main class="container">
        <h1 class="fade-up delay-1">Web Creator<span class="dot">.</span></h1>
        
        <p class="fade-up delay-2">Contact me to design a website for you.</p>
        
        <div class="contact-links fade-up delay-3">
            <!-- The mailto: and tel: tags make these buttons actually work when clicked -->
            <a href="mailto:igorrix344@gmail.com">igorrix344@gmail.com</a>
            <a href="tel:0619280584">0619280584</a>
        </div>
    </main>

</body>
</html>
