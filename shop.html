<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Shop | Tack and Tail</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@100;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <style>
        :root {
            --ios-glass: rgba(255, 255, 255, 0.75);
            --ios-blur: blur(25px);
            --primary: #1b3022;
            --accent: #c5a059;
            --bg: #f2f2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { background: #000; font-family: 'Montserrat', sans-serif; overflow-x: hidden; color: var(--primary); }

        #page-wrapper {
            width: 100%; min-height: 100vh; transform-origin: center center;
            position: relative; z-index: 1; transform: scale(0.85);
            opacity: 0; filter: blur(15px); border-radius: 40px;
        }

        .app-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: -2; }

        .bg-text-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .bg-moving-text {
            position: sticky; top: 50%; transform: translateY(-50%); display: block;
            font-size: 25vw; font-weight: 900; color: rgba(27, 48, 34, 0.06); 
            white-space: nowrap; text-transform: uppercase; text-align: center;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 5%; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000;
            background: linear-gradient(to bottom, rgba(242,242,247,0.8), transparent);
            backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; text-decoration: none; color: var(--primary); letter-spacing: 2px; }

        /* Back Button - Positioned to look like an app 'Back' action */
        .back-btn {
            position: fixed; top: 75px; left: 20px; background: white;
            width: 45px; height: 45px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; z-index: 1001;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Category Bar (The 'Pills') */
        .category-bar {
            padding: 135px 5% 10px; /* Adjusted for back button space */
            display: flex; gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-chip {
            padding: 10px 22px; background: white; border-radius: 25px;
            font-size: 0.75rem; font-weight: 600; white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04); cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .cat-chip.active { 
            background: var(--primary); 
            color: white; 
            transform: scale(1.05);
        }

        /* Shop Grid */
        .shop-container { padding: 20px 5% 50px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; } }

        .product-card {
            background: white; border-radius: 25px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
        }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .product-info { padding: 15px; }
        .product-info h3 { font-size: 0.85rem; margin-bottom: 5px; font-weight: 600; }
        .product-info p { font-size: 0.75rem; color: var(--accent); font-weight: 600; }
		
		:root {
    --ios-glass: rgba(255, 255, 255, 0.75);
    --ios-blur: blur(25px);
    --primary: #1b3022;
    --accent: #c5a059;
    --bg: #f2f2f7; /* Matching the app color */
}

html, body { 
    /* We change the body color to light grey so no black appears */
    background: var(--bg) !important; 
    margin: 0;
    padding: 0;
    width: 100%;
    /* These two are the secret to stopping the diagonal pull */
    overflow-x: hidden;
    position: relative;
}

#page-wrapper {
    width: 100%;
    min-height: 100vh;
    transform-origin: center center;
    position: relative;
    z-index: 1;
    overflow: hidden; /* Clips any horizontal 'leaks' */
    /* Remove touch-action: pan-y; if you added it earlier */
}
    </style>
</head>
<body>

    <div id="page-wrapper">
        <div class="app-bg"></div>
        <div class="bg-text-container">
            <div class="bg-moving-text" id="scrollText">THE SHOP</div>
        </div>

        <header>
            <a href="index.html" class="logo">TACK & TAIL</a>
        </header>

        <div class="back-btn" onclick="goHome()">
            <i class="fas fa-chevron-left"></i>
        </div>

        <div class="category-bar">
            <div class="cat-chip active" onclick="filterCategory(this, 'all')">All Items</div>
            <div class="cat-chip" onclick="filterCategory(this, 'tack')">Tack</div>
            <div class="cat-chip" onclick="filterCategory(this, 'feed')">Feed</div>
            <div class="cat-chip" onclick="filterCategory(this, 'apparel')">Apparel</div>
            <div class="cat-chip" onclick="filterCategory(this, 'vet')">Vet Supplies</div>
        </div>

        <section class="shop-container">
            <div class="product-grid">
                <div class="product-card reveal" data-category="tack">
                    <img src="https://images.unsplash.com/photo-1601989391033-5b9a7d35b5b2?q=80&w=500" class="product-img">
                    <div class="product-info">
                        <h3>Leather Saddle</h3>
                        <p>R 4,200.00</p>
                    </div>
                </div>
                <div class="product-card reveal" data-category="apparel">
                    <img src="https://images.unsplash.com/photo-1534430480872-3498386e7856?q=80&w=500" class="product-img">
                    <div class="product-info">
                        <h3>Riding Boots</h3>
                        <p>R 1,200.00</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        gsap.registerPlugin(ScrollTrigger);

        // --- Category Filter Logic ---
        function filterCategory(element, category) {
            // Remove active class from all chips
            document.querySelectorAll('.cat-chip').forEach(chip => chip.classList.remove('active'));
            // Add active class to clicked chip
            element.classList.add('active');

            // Logic for filtering items (can be expanded based on your data-category attributes)
            const products = document.querySelectorAll('.product-card');
            products.forEach(product => {
                if (category === 'all' || product.getAttribute('data-category') === category) {
                    gsap.to(product, { opacity: 1, scale: 1, duration: 0.3, display: "block" });
                } else {
                    gsap.to(product, { opacity: 0, scale: 0.9, duration: 0.3, display: "none" });
                }
            });
        }

        // --- Animations ---
        window.addEventListener('DOMContentLoaded', () => {
            gsap.to("#page-wrapper", {
                scale: 1, opacity: 1, filter: "blur(0px)", borderRadius: "0px", duration: 1.2, ease: "expo.out"
            });
        });

        function goHome() {
            gsap.to("#page-wrapper", {
                scale: 0.8, opacity: 0, filter: "blur(20px)", duration: 0.8, ease: "power2.in",
                onComplete: () => { window.location.href = "index.html"; }
            });
        }

        gsap.to("#scrollText", {
            x: -500,
            scrollTrigger: { trigger: "body", start: "top top", end: "bottom bottom", scrub: 1.5 }
        });
    </script>
</body>
</html>
